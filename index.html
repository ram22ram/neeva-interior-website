<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neeva Interior Studio | Jabalpur</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- React, ReactDOM, Emotion, and MUI CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@emotion/react@11/dist/emotion-react.umd.min.js"></script>
    <script src="https://unpkg.com/@emotion/styled@11/dist/emotion-styled.umd.min.js"></script>
    <script src="https://unpkg.com/@mui/material@5/umd/material-ui.production.min.js"></script>

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #fafafa;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const {
            ThemeProvider, createTheme, CssBaseline, AppBar, Toolbar, Typography,
            Button, Container, Grid, Card, CardContent, CardMedia, Box, IconButton,
            Paper, Avatar, Rating, Divider, List, ListItem, ListItemIcon, ListItemText
        } = MaterialUI;

        // Custom Theme Configuration
        const theme = createTheme({
            typography: {
                fontFamily: 'Poppins, sans-serif',
                h1: { fontWeight: 700 },
                h2: { fontWeight: 700 },
                h4: { fontWeight: 600 },
                h5: { fontWeight: 600 },
                h6: { fontWeight: 600 },
            },
            palette: {
                primary: { main: '#1976d2' }, // Material Blue
                secondary: { main: '#ffffff' },
                background: { default: '#fafafa' }
            },
            components: {
                MuiCard: {
                    styleOverrides: {
                        root: {
                            borderRadius: '16px',
                            boxShadow: '0 4px 20px rgba(0,0,0,0.05)',
                            transition: 'transform 0.3s ease-in-out',
                            '&:hover': {
                                transform: 'translateY(-5px)',
                                boxShadow: '0 8px 30px rgba(0,0,0,0.1)',
                            }
                        }
                    }
                },
                MuiButton: {
                    styleOverrides: {
                        root: {
                            textTransform: 'none',
                            borderRadius: '8px',
                            fontWeight: 600,
                            padding: '10px 24px'
                        }
                    }
                }
            }
        });

        // Data Models
        const services = [
            { title: 'Modular Kitchen Design', img: 'https://placehold.co/600x400/e3f2fd/1976d2?text=Modular+Kitchen', desc: 'Custom, modern, and space-efficient kitchen setups.' },

            { title: '3D Interior Design', img: 'https://placehold.co/600x400/e3f2fd/1976d2?text=3D+Design', desc: 'Realistic 3D visual representations of your future space.' },
            { title: 'Carpentry Work', img: 'https://placehold.co/600x400/e3f2fd/1976d2?text=Carpentry', desc: 'Expert woodwork and installation services.' },
            { title: 'Site Supervision', img: 'https://placehold.co/600x400/e3f2fd/1976d2?text=Site+Supervision', desc: 'End-to-end monitoring to ensure high-quality execution.' }
        ];

        const pricing = [
            { plan: 'Modular Kitchen', price: '₹1,00,000+', features: ['Premium Materials', 'Custom Hardware', 'Space Optimization', 'Installation Included'] },
            { plan: 'Waterproofing', price: '₹25 – ₹45', unit: 'per sq.ft', features: ['High-Grade Chemicals', 'Crack Filling', 'Leakage Warranty', 'Surface Preparation'] },

            { name: "Suresh K.", review: "Quick service and professional work. Highly recommend their interior solutions!" },

                            <Box sx={{ display: { xs: 'none', md: 'block' } }}>

                    {/* About Section */}

                                <Grid item xs={12} md={6}>
                                    <img src="https://placehold.co/600x500/e3f2fd/1976d2?text=About+Neeva+Studio" alt="About Us" style={{ width: '100%', borderRadius: '16px' }} />
                                </Grid>
                                <Grid item xs={12} md={6}>
                                    <Typography variant="overline" color="primary" fontWeight="bold">Established 2023</Typography>

                                    <Typography variant="body1" color="text.secondary" paragraph sx={{ fontSize: '1.1rem', lineHeight: 1.8 }}>

                                        <ListItem disablePadding sx={{ mb: 1 }}>
                                            <ListItemIcon><span className="material-icons" style={{ color: '#1976d2' }}>check_circle</span></ListItemIcon>

                                        </ListItem>
                                        <ListItem disablePadding>
                                            <ListItemIcon><span className="material-icons" style={{ color: '#1976d2' }}>check_circle</span></ListItemIcon>
                                            <ListItemText primary="Timely Delivery & Professional Execution" />
                                        </ListItem>
                                    </List>
                                </Grid>
                            </Grid>
                        </Container>
                    </Box>

                    {/* Services Section */}
                    <Box id="services" sx={{ py: 8 }}>

                            <Typography variant="h3" align="center" gutterBottom sx={{ fontWeight: 'bold' }}>

                                                height="200"
                                                image={service.img}
                                                alt={service.title}
                                            />
                                            <CardContent>
                                                <Typography variant="h6" gutterBottom>{service.title}</Typography>

                                                    {service.desc}

                                            </CardContent>
                                        </Card>
                                    </Grid>
                                ))}
                            </Grid>

                    </Box>

                            </Typography>
                            <Typography variant="h6" align="center" color="text.secondary" sx={{ mb: 6, fontWeight: 400 }}>
                                Transparent pricing for premium quality services.
                            </Typography>
                            <Grid container spacing={4} justifyContent="center">
                                {pricing.map((item, index) => (
                                    <Grid item xs={12} md={4} key={index}>
                                        <Card sx={{ height: '100%', display: 'flex', flexDirection: 'column', p: 2 }}>
                                            <CardContent sx={{ flexGrow: 1, textAlign: 'center' }}>
                                                <Typography variant="h5" color="primary" gutterBottom sx={{ fontWeight: 'bold' }}>
                                                    {item.plan}
                                                </Typography>
                                                <Box sx={{ my: 3 }}>
                                                    <Typography variant="h3" component="span" sx={{ fontWeight: 'bold' }}>
                                                        {item.price}
                                                    </Typography>
                                                    {item.unit && (
                                                        <Typography variant="subtitle1" color="text.secondary">
                                                            / {item.unit}
                                                        </Typography>
                                                    )}
                                                </Box>
                                                <Divider sx={{ mb: 3 }} />
                                                <List>
                                                    {item.features.map((feat, i) => (
                                                        <ListItem key={i} sx={{ py: 0.5, px: 0 }}>
                                                            <ListItemIcon sx={{ minWidth: 36 }}>
                                                                <span className="material-icons" style={{ color: 'green', fontSize: '20px' }}>check</span>
                                                            </ListItemIcon>
                                                            <ListItemText primary={feat} />
                                                        </ListItem>
                                                    ))}
                                                </List>
                                            </CardContent>
                                            <Box sx={{ p: 2, pt: 0 }}>
                                                <Button fullWidth variant="outlined" color="primary" href="tel:+918105462260">
                                                    Inquire Now
                                                </Button>
                                            </Box>
                                        </Card>
                                    </Grid>
                                ))}
                            </Grid>
                        </Container>
                    </Box>

                    {/* Why Choose Us & Ratings */}
                    <Box id="why-choose-us" sx={{ py: 8, bgcolor: 'primary.main', color: 'white' }}>
                        <Container>
                            <Grid container spacing={4} alignItems="center">
                                <Grid item xs={12} md={8}>
                                    <Typography variant="h3" gutterBottom sx={{ fontWeight: 'bold' }}>
                                        Why Choose Neeva?

                                    <Typography variant="h6" sx={{ fontWeight: 400, opacity: 0.9, mb: 4 }}>
                                        We are committed to delivering excellence. Our customers trust us for our transparency, quality, and timely project delivery.
                                    </Typography>
                                    <Grid container spacing={3}>
                                        <Grid item xs={6} md={3}>
                                            <Typography variant="h4" fontWeight="bold">200+</Typography>
                                            <Typography variant="body1">Happy Clients</Typography>
                                        </Grid>
                                        <Grid item xs={6} md={3}>
                                            <Typography variant="h4" fontWeight="bold">2-3</Typography>
                                            <Typography variant="body1">Years Experience</Typography>
                                        </Grid>
                                        <Grid item xs={6} md={3}>
                                            <Typography variant="h4" fontWeight="bold">100%</Typography>
                                            <Typography variant="body1">Customization</Typography>
                                        </Grid>
                                        <Grid item xs={6} md={3}>
                                            <Typography variant="h4" fontWeight="bold">Verified</Typography>
                                            <Typography variant="body1">Business</Typography>
                                        </Grid>
                                    </Grid>
                                </Grid>
                                <Grid item xs={12} md={4}>
                                    <Paper elevation={4} sx={{ p: 4, borderRadius: '16px', textAlign: 'center' }}>
                                        <Typography variant="h2" color="primary" fontWeight="bold">5.0</Typography>
                                        <Rating value={5} readOnly size="large" sx={{ my: 1 }} />
                                        <Typography variant="body1" color="text.secondary" fontWeight="bold">
                                            Outstanding Ratings
                                        </Typography>
                                        <Typography variant="body2" color="text.secondary" sx={{ mt: 1 }}>
                                            Based on 200+ Justdial reviews
                                        </Typography>
                                    </Paper>
                                </Grid>
                            </Grid>
                        </Container>
                    </Box>

                    {/* Testimonials */}
                    <Box id="testimonials" sx={{ py: 8, bgcolor: 'background.default' }}>
                        <Container>
                            <Typography variant="h3" align="center" gutterBottom sx={{ fontWeight: 'bold' }}>
                                Client Testimonials
                            </Typography>
                            <Typography variant="h6" align="center" color="text.secondary" sx={{ mb: 6, fontWeight: 400 }}>
                                Hear what our customers have to say about our work.
                            </Typography>
                            <Grid container spacing={4} justifyContent="center">
                                {testimonials.map((testimonial, index) => (
                                    <Grid item xs={12} md={5} key={index}>
                                        <Paper elevation={0} sx={{ p: 4, borderRadius: '16px', bgcolor: 'background.paper', border: '1px solid #e0e0e0' }}>
                                            <span className="material-icons" style={{ color: '#1976d2', fontSize: '40px', opacity: 0.2 }}>format_quote</span>
                                            <Typography variant="h6" sx={{ mt: 2, mb: 3, fontStyle: 'italic', fontWeight: 400 }}>
                                                "{testimonial.review}"
                                            </Typography>
                                            <Box sx={{ display: 'flex', alignItems: 'center', gap: 2 }}>
                                                <Avatar sx={{ bgcolor: 'primary.main' }}>{testimonial.name.charAt(0)}</Avatar>
                                                <Typography variant="subtitle1" fontWeight="bold">
                                                    {testimonial.name}
                                                </Typography>
                                            </Box>
                                        </Paper>
                                    </Grid>
                                ))}
                            </Grid>
                        </Container>
                    </Box>

                    {/* Contact Section */}
                    <Box id="contact" sx={{ py: 8, bgcolor: 'background.paper' }}>
                        <Container>
                            <Typography variant="h3" align="center" gutterBottom sx={{ fontWeight: 'bold' }}>
                                Get In Touch
                            </Typography>
                            <Grid container spacing={6} sx={{ mt: 2 }}>
                                <Grid item xs={12} md={5}>
                                    <Typography variant="h5" gutterBottom fontWeight="bold">Contact Information</Typography>
                                    <List>
                                        <ListItem sx={{ px: 0 }}>
                                            <ListItemIcon><span className="material-icons" style={{ color: '#1976d2' }}>location_on</span></ListItemIcon>
                                            <ListItemText
                                                primary="Address"
                                                secondary="Near Sai Mandir, Vatsala Paradise Road, Krishi Upaj Mandi, Jabalpur, MP - 482002"

                                        <ListItem sx={{ px: 0 }}>
                                            <ListItemIcon><span className="material-icons" style={{ color: '#1976d2' }}>phone</span></ListItemIcon>
                                            <ListItemText
                                                primary="Phone"
                                                secondary="+91 8105462260"
                                            />
                                        </ListItem>
                                        <ListItem sx={{ px: 0 }}>
                                            <ListItemIcon><span className="material-icons" style={{ color: '#1976d2' }}>access_time</span></ListItemIcon>
                                            <ListItemText
                                                primary="Business Hours"
                                                secondary="Open Daily"
                                            />
                                        </ListItem>
                                    </List>
                                    <Button variant="contained" size="large" href="tel:+918105462260" sx={{ mt: 2, mr: 2 }}>
                                        Call Us Now
                                    </Button>
                                    <Button variant="outlined" size="large" href="https://wa.me/918105462260" sx={{ mt: 2 }}>

                                    </Button>

                                    <Box sx={{ width: '100%', height: '400px', bgcolor: '#e0e0e0', borderRadius: '16px', overflow: 'hidden' }}>
                                        {/* Fallback map iframe. Using Jabalpur coordinates/search */}
                                        <iframe
                                            width="100%"
                                            height="100%"
                                            style={{ border: 0 }}
                                            loading="lazy"

                                    </Box>
                                </Grid>
                            </Grid>
                        </Container>
                    </Box>

                    {/* Footer */}
                    <Box sx={{ bgcolor: '#0d47a1', color: 'white', py: 4, textAlign: 'center' }}>

                                &copy; {new Date().getFullYear()} Neeva Interior Studio. All Rights Reserved.
                            </Typography>
                        </Container>

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
